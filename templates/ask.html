<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字典應用</title>
    <style>
        body {
            margin: 0;
            font-family: "Noto Sans TC", sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #1565c0;
            font-size: 24px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0d47a1;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #f1f8e9;
            border-radius: 8px;
            color: #333;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #777;
            font-size: 14px;
        }
        a:hover {
            color: #1565c0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 中韓對照字典</h1>
    
    <form method="POST">
        <input type="text" name="question" placeholder="輸入中文或韓文..." value="{{ question }}" required>
        <br>
        <button type="submit">查詢</button>
    </form>

    {% if answer %}
    <div class="result">
        <p><strong>輸入：</strong> {{ question }}</p>
        <p><strong>翻譯：</strong> {{ answer }}</p>
    </div>
    {% endif %}

    <a href="/">← 返回首頁</a>
</div>

</body>
</html>
